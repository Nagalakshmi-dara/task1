<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <style>
        body {
            background-image: url("https://img.freepik.com/free-vector/geometric-gradient-futuristic-background_23-2149116406.jpg");
            background-size: cover;
            min-height: 90vh;
        }

        .parent-container {
            background-color: white;
            width: 30%;
            text-align: center;
            padding: 20px;
            font-family: sans-serif;
            margin: 5% auto;
            border-radius: 10px;
        }

        .form-field {
            margin: 12px 0;
        }

        .form-field input,
        textarea,
        select {
            padding: 10px;
            width: 80%;
            font-size: 0.9rem;
            border: 1px solid rgba(0, 0, 0, 0.5);
            border-radius: 5px;
        }

        .form-group {
            width: 85%;
            margin: auto;
            text-align: left;
            font-size: 0.8rem;
        }

        .btn-grad {
            background-image: linear-gradient(to right, #AA076B 0%, #61045F 51%, #AA076B 100%);
            margin: 15px auto;
            width: 85%;
            padding: 12px;
            text-transform: uppercase;
            background-size: 200% auto;
            color: white;
            border-radius: 10px;
            display: block;
            border: none;
            cursor: pointer;
        }

        .btn-grad:hover {
            background-position: right center;
        }
    </style>
</head>

<body>

    <form class="parent-container" action="./login.html">

        <h2>REGISTRATION PAGE</h2>

        <div class="form-field">
            <input type="text" placeholder="Enter your Name" name="name" required>
        </div>

        <div class="form-field">
            <input type="email" placeholder="Enter Email" name="email" required>
        </div>

        <div class="form-field">
            <input type="password" placeholder="Enter Password" name="password" required>
        </div>

        <div class="form-field">
            <input type="password" placeholder="Confirm Password" name="pconfirmation" required>
        </div>

        <div class="form-field">
            <input type="tel" placeholder="Enter Mobile Number" name="mobile" required>
        </div>

        <div class="form-group">
            <label>Gender:</label><br>
            <input type="radio" id="male" name="gender" value="male" required>
            <label for="male">Male</label>

            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label>
        </div>
        <div class="form-group">
            <label>Education:</label><br>
            <input type="checkbox" id="e10th" value="10th">
            <label for="e10th">10th</label>

            <input type="checkbox" id="einter" value="inter">
            <label for="einter">Inter</label>

            <input type="checkbox" id="ediploma" value="Diploma">
            <label for="ediploma">Diploma</label>

            <input type="checkbox" id="ebtech" value="btech">
            <label for="ebtech">B.Tech</label>
        </div>

        <div class="form-field">
            <select required>
                <option value="">Select your city</option>
                <option value="vijayawada">Vijayawada</option>
                <option value="hyderabad">Hyderabad</option>
                <option value="bangalore">Bangalore</option>
            </select>
        </div>

        <div class="form-field">
            <input type="date" required>
        </div>

        <div class="form-field">
            <textarea rows="4" placeholder="Enter your address"></textarea>
        </div>

        <button class="btn-grad">REGISTER</button>

    </form>

</body>

</html>
